pairs_uav_managers:

  control_manager:

    ExampleTracker:
      address: "pairs_example_tracker_plugin/ExampleTracker"
      namespace: "example_tracker"
      human_switchable: true

    # list of names of dynamically loaded trackers
    trackers : [
      "ExampleTracker",
    ]

  uav_manager:

    takeoff:
      after_takeoff:
        tracker: "ExampleTracker"

    midair_activation:
      after_activation:
        tracker: "ExampleTracker"

    min_height_checking:
      enabled: false

    max_height_checking:
      enabled: false
